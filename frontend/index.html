<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Edge V∞ — BASKETBALL</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0014; color:#e0e0e0; font-family:'Segoe UI',Arial,sans-serif; min-height:100vh; padding:16px; }
        .nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .nav a { color:#444; text-decoration:none; font-size:.8rem; letter-spacing:2px; }
        .nav a:hover { color:#b300ff; }
        h1 { color:#b300ff; font-size:1.8rem; letter-spacing:4px; text-shadow:0 0 20px #b300ff; }
        .subtitle { color:#444; font-size:.75rem; letter-spacing:3px; margin-top:4px; margin-bottom:20px; }
        .search-box { display:flex; gap:8px; margin-bottom:16px; }
        .search-input { flex:1; padding:12px 16px; background:rgba(179,0,255,0.08); border:1px solid rgba(179,0,255,0.3); color:#fff; font-size:.9rem; outline:none; transition:.2s; }
        .search-input:focus { border-color:#b300ff; box-shadow:0 0 12px rgba(179,0,255,0.3); }
        .search-input::placeholder { color:#444; }
        .search-btn { padding:12px 20px; background:rgba(179,0,255,0.2); border:1px solid #b300ff; color:#b300ff; cursor:pointer; font-size:.85rem; transition:.2s; }
        .search-btn:hover { background:#b300ff; color:#000; }
        .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .tab { padding:8px 14px; border:1px solid rgba(179,0,255,0.3); background:transparent; color:#555; font-size:.75rem; letter-spacing:2px; cursor:pointer; transition:.2s; }
        .tab.active, .tab:hover { border-color:#b300ff; color:#b300ff; background:rgba(179,0,255,0.1); }
        .match-count { color:#555; font-size:.75rem; margin-bottom:12px; }
        .card { border:1px solid rgba(179,0,255,0.25); background:rgba(10,0,20,0.6); padding:16px; margin-bottom:12px; position:relative; overflow:hidden; transition:.25s; }
        .card::after { content:""; position:absolute; top:0; left:-100%; width:100%; height:2px; background:linear-gradient(90deg,transparent,#b300ff,transparent); animation:hud 3s linear infinite; }
        .card:hover { border-color:#b300ff; box-shadow:0 0 16px rgba(179,0,255,0.3); }
        @keyframes hud { 0%{left:-100%} 100%{left:100%} }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .score-badge { background:rgba(179,0,255,0.2); border:1px solid #b300ff; color:#b300ff; padding:3px 8px; font-size:.7rem; letter-spacing:2px; }
        .teams { font-size:1rem; color:#fff; margin-bottom:8px; }
        .vs { color:#b300ff; margin:0 6px; }
        .stats-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:.8rem; color:#888; }
        .stats-row span { color:#b300ff; }
        .verdict-value { color:#ff6600; font-weight:bold; font-size:.85rem; }
        .verdict-none { color:#333; font-size:.85rem; }
        .winner { color:#00ff88; font-weight:bold; }
        .highlight { background:rgba(179,0,255,0.3); color:#fff; padding:0 2px; }
        .loader { color:#333; letter-spacing:3px; text-align:center; margin-top:60px; font-size:.85rem; }
        .no-result { color:#444; text-align:center; margin-top:40px; letter-spacing:2px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">← ACCUEIL</a>
        <span style="color:#b300ff;font-size:.7rem;letter-spacing:2px" id="last-update"></span>
    </div>

    <h1>🏀 BASKETBALL</h1>
    <p class="subtitle">SHADOW EDGE V∞ — ANALYSE PRÉ-MATCH</p>

    <div class="search-box">
        <input class="search-input" id="search-input" type="text"
               placeholder="🔍 Rechercher un joueur ou une équipe..." oninput="onSearch()">
        <button class="search-btn" onclick="clearSearch()">✕</button>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('top10', this)">🏆 TOP 10</button>
        <button class="tab" onclick="showTab('all', this)">📋 TOUS</button>
        <button class="tab" onclick="showTab('value', this)">🔥 VALUE</button>
    </div>

    <div class="match-count" id="match-count"></div>
    <div id="container"><p class="loader">Chargement...</p></div>

<script>
    let allMatches = [];
    let currentTab = 'top10';
    let searchTerm = '';

    async function loadData() {
        try {
            const r    = await fetch('/data/basketball');
            const data = await r.json();
            allMatches = data.matches || [];
            document.getElementById('last-update').textContent =
                data.date ? 'Analyse: ' + data.date : '';
            renderCurrent();
        } catch(e) {
            document.getElementById('container').innerHTML =
                '<p class="loader">En attente des données Termux...</p>';
        }
    }

    function showTab(tab, btn) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (btn) btn.classList.add('active');
        renderCurrent();
    }

    function onSearch() {
        searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
        renderCurrent();
    }

    function clearSearch() {
        document.getElementById('search-input').value = '';
        searchTerm = '';
        renderCurrent();
    }

    function filterMatches() {
        let matches = [...allMatches];
        if (currentTab === 'top10')
            matches = [...matches].sort((a,b) => (b.shadow_score||0)-(a.shadow_score||0)).slice(0,10);
        else if (currentTab === 'value')
            matches = matches.filter(m => m.verdict && m.verdict !== '⚪ Pas de value');
        if (searchTerm)
            matches = matches.filter(m =>
                m.home?.toLowerCase().includes(searchTerm) ||
                m.away?.toLowerCase().includes(searchTerm)
            );
        return matches;
    }

    function highlight(text) {
        if (!searchTerm || !text) return text || '—';
        const re = new RegExp('(' + searchTerm + ')', 'gi');
        return text.replace(re, '<span class="highlight">$1</span>');
    }

    function renderCurrent() {
        const matches = filterMatches();
        document.getElementById('match-count').textContent =
            matches.length + ' match' + (matches.length > 1 ? 's' : '');
        renderMatches(matches);
    }

    function renderMatches(matches) {
        const container = document.getElementById('container');
        if (!matches || matches.length === 0) {
            container.innerHTML = searchTerm
                ? '<p class="no-result">Aucun résultat pour "' + searchTerm + '"</p>'
                : '<p class="loader">Aucun match disponible.</p>';
            return;
        }
        container.innerHTML = matches.map(function(m) {
            const pred    = m.prediction || {};
            const odds    = m.odds || {};
            const form    = m.form || {};
            const score   = m.shadow_score || 0;
            const verdict = m.verdict || '';
            const isValue = verdict !== '⚪ Pas de value' && verdict !== '';
            return '<div class="card">' +
                '<div class="card-header">' +
                    '<span class="score-badge">😈 ' + score + '/100</span>' +
                    '<span style="color:#555;font-size:.7rem">' + (m.time||'') + '</span>' +
                '</div>' +
                '<div class="teams">' + highlight(m.home) + ' <span class="vs">VS</span> ' + highlight(m.away) + '</div>' +
                '<div class="stats-row">Prédiction <span class="winner">' + (pred.winner||'—') + '</span></div>' +
                '<div class="stats-row">Proba <span>' + ((pred.home_prob||0)*100).toFixed(0) + '% / ' + ((pred.away_prob||0)*100).toFixed(0) + '%</span></div>' +
                '<div class="stats-row">Cotes <span>1:' + (odds['1']||'—') + ' 2:' + (odds['2']||'—') + '</span></div>' +
                '<div class="stats-row">Forme DOM: ' + ((form.home||[]).join('')||'?') + ' EXT: ' + ((form.away||[]).join('')||'?') + ' <span>' + (form.home_trend||'') + '</span></div>' +
                (m.h2h ? '<div class="stats-row">H2H (' + (m.h2h.total||0) + ') <span>' + (m.h2h.home_wins||0) + 'W ' + (m.h2h.draws||0) + 'D ' + (m.h2h.away_wins||0) + 'L</span></div>' : '') +
                '<div style="margin-top:8px"><span class="' + (isValue ? 'verdict-value' : 'verdict-none') + '">' + verdict + '</span></div>' +
            '</div>';
        }).join('');
    }

    loadData();
    setInterval(loadData, 300000);
</script>
</body>
</html>
