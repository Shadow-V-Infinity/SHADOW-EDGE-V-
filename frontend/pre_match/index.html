<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Avant-match – Shadow Edge V∞</title>
    <style>
        body {
            background: #0a0014;
            color: #b300ff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 40px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 12px #b300ff;
        }

        #refresh-btn {
            padding: 10px 18px;
            background: rgba(179, 0, 255, 0.2);
            border: 1px solid #b300ff;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.25s ease;
        }

        #refresh-btn:hover {
            background: rgba(179, 0, 255, 0.35);
            box-shadow: 0 0 12px #b300ff;
        }

        #pre-match-container {
            width: 90%;
            max-width: 600px;
            margin: auto;
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(179, 0, 255, 0.3);
        }

        .team {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .stat-block {
            margin-top: 15px;
            padding: 10px;
            background: rgba(179, 0, 255, 0.1);
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1>Avant-match</h1>

    <button id="refresh-btn">Refresh</button>

    <div id="pre-match-container">
        Chargement des données...
    </div>

    <script>
        async function loadPreMatch() {
            const container = document.getElementById("pre-match-container");
            container.innerHTML = "Chargement...";

            try {
                const response = await fetch("/nba/pre_match/games");
                const data = await response.json();

                if (!data || data.length === 0) {
                    container.innerHTML = "<p>Aucun match disponible.</p>";
                    return;
                }

                const game = data[0]; // on prend le premier match pour l'instant

                container.innerHTML = `
                    <div class="team">${game.homeTeam} vs ${game.awayTeam}</div>

                    <div class="stat-block">
                        <strong>Stats :</strong><br>
                        Pace : ${game.pace}<br>
                        Offensive Rating : ${game.off_rating}<br>
                        Defensive Rating : ${game.def_rating}<br>
                        Forme récente : ${game.form}
                    </div>
                `;
            } catch (error) {
                container.innerHTML = "<p>Erreur lors du chargement.</p>";
                console.error(error);
            }
        }

        document.getElementById("refresh-btn").addEventListener("click", loadPreMatch);

        loadPreMatch();
    </script>

</body>
</html>
