<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Avant-match – Shadow Edge V∞</title>
    <style>
        body {
            background: #0a0014;
            color: #b300ff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 40px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 12px #b300ff;
        }

        #refresh-btn {
            padding: 10px 18px;
            background: rgba(179, 0, 255, 0.2);
            border: 1px solid #b300ff;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.25s ease;
        }

        #refresh-btn:hover {
            background: rgba(179, 0, 255, 0.35);
            box-shadow: 0 0 12px #b300ff;
        }

        #game-count {
            font-size: 0.85rem;
            color: rgba(179, 0, 255, 0.6);
            margin-bottom: 16px;
        }

        #pre-match-container {
            width: 90%;
            max-width: 600px;
            margin: auto;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(179, 0, 255, 0.3);
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .game-card:hover {
            border-color: #b300ff;
            box-shadow: 0 0 16px rgba(179, 0, 255, 0.25);
        }

        .team {
            font-size: 1.3rem;
            margin-bottom: 6px;
            color: #fff;
        }

        .status {
            font-size: 0.8rem;
            color: rgba(179, 0, 255, 0.6);
            margin-bottom: 12px;
        }

        .stat-block {
            margin-top: 12px;
            padding: 10px;
            background: rgba(179, 0, 255, 0.1);
            border-radius: 6px;
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .stat-block strong {
            color: #b300ff;
        }

        .stat-val {
            color: #fff;
        }

        .stat-null {
            color: rgba(255,255,255,0.3);
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(179, 0, 255, 0.5);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <h1>Avant-match</h1>

    <button id="refresh-btn">Refresh</button>

    <div id="game-count"></div>

    <div id="pre-match-container">
        Chargement des données...
    </div>

    <script>
        function statVal(val) {
            if (val === null || val === undefined) {
                return `<span class="stat-null">—</span>`;
            }
            return `<span class="stat-val">${val}</span>`;
        }

        async function loadPreMatch() {
            const container = document.getElementById("pre-match-container");
            const countEl   = document.getElementById("game-count");
            container.innerHTML = "Chargement...";
            countEl.textContent = "";

            try {
                const response = await fetch("/nba/pre_match/games");
                const data = await response.json();

                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty">Aucun match disponible aujourd\'hui.</div>';
                    return;
                }

                countEl.textContent = `${data.length} match${data.length > 1 ? 's' : ''} aujourd'hui`;

                // ✅ On affiche TOUS les matchs
                container.innerHTML = data.map(game => `
                    <div class="game-card">
                        <div class="team">${game.homeTeam} vs ${game.awayTeam}</div>
                        <div class="status">${game.status || 'Programmé'}</div>

                        <div class="stat-block">
                            <strong>Stats :</strong><br>
                            Pace : ${statVal(game.pace)}<br>
                            Offensive Rating : ${statVal(game.off_rating)}<br>
                            Defensive Rating : ${statVal(game.def_rating)}<br>
                            Forme récente : ${statVal(game.form)}
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                container.innerHTML = "<p>Erreur lors du chargement.</p>";
                console.error(error);
            }
        }

        document.getElementById("refresh-btn").addEventListener("click", loadPreMatch);

        loadPreMatch();
    </script>

</body>
</html>
