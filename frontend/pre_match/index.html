<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shadow Edge">
    <meta name="theme-color" content="#0a1628">
    <link rel="manifest" href="/manifest.json">
    <title>Avant-match – Shadow Edge V∞</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #070f1e;
            color: #c8d8f0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(180deg, #0a1628 0%, #070f1e 100%);
            border-bottom: 1px solid #1a3a6e;
            padding: 22px 20px 18px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #4a9eff;
            text-shadow: 0 0 20px rgba(74,158,255,0.4);
        }

        .subtitle {
            font-size: 0.72rem;
            color: #2a4a7a;
            letter-spacing: 3px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #0a1628;
            border-bottom: 1px solid #112240;
        }

        .game-count {
            font-size: 0.8rem;
            color: #4a9eff;
            letter-spacing: 1px;
            font-weight: 600;
        }

        #refresh-btn {
            padding: 7px 18px;
            background: #1a3a6e;
            border: 1px solid #2a5aae;
            border-radius: 5px;
            color: #4a9eff;
            cursor: pointer;
            font-size: 0.78rem;
            letter-spacing: 2px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        #refresh-btn:hover {
            background: #2a5aae;
            color: #fff;
            box-shadow: 0 0 12px rgba(74,158,255,0.3);
        }

        /* ── GRID ── */
        #pre-match-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px 12px;
        }

        /* ── CARD ── */
        .game-card {
            background: #0d1e36;
            border: 1px solid #1a3a6e;
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .game-card:hover {
            border-color: #4a9eff;
            box-shadow: 0 0 18px rgba(74,158,255,0.15);
        }

        /* top accent line */
        .card-top {
            height: 2px;
            background: linear-gradient(90deg, #1a3a6e, #4a9eff, #1a3a6e);
        }

        .card-body {
            padding: 14px 16px 12px;
        }

        /* ── TEAMS ── */
        .teams-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .team-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: #e8f0ff;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .team-name.away { text-align: right; }

        .vs {
            font-size: 0.7rem;
            color: #2a4a7a;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 0 10px;
        }

        .game-status {
            font-size: 0.72rem;
            color: #4a9eff;
            letter-spacing: 1px;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        /* ── STATS ── */
        .stat-block {
            background: #071428;
            border: 1px solid #112240;
            border-radius: 6px;
            padding: 10px 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .stat-label {
            color: #2a5a8a;
            font-size: 0.72rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stat-value {
            color: #4a9eff;
            font-weight: 700;
            font-size: 0.82rem;
        }

        .stat-value.null-val {
            color: #1a3a5e;
            font-weight: 400;
        }

        /* ── GAME ID ── */
        .card-footer {
            padding: 6px 16px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-id {
            font-size: 0.65rem;
            color: #1a3a5e;
            letter-spacing: 1px;
        }

        /* ── EMPTY / ERROR ── */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #1a3a5e;
            font-size: 0.9rem;
        }

        .empty-icon { font-size: 36px; margin-bottom: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>SHADOW EDGE V∞</h1>
        <p class="subtitle">Moteur analytique NBA — Avant-Match</p>
    </header>

    <div class="toolbar">
        <div class="game-count" id="game-count">—</div>
        <button id="refresh-btn">REFRESH</button>
    </div>

    <div id="pre-match-container">
        <div class="empty"><div class="empty-icon">🏀</div>Chargement...</div>
    </div>

    <script>
        function statVal(val) {
            if (val === null || val === undefined) {
                return `<span class="stat-value null-val">—</span>`;
            }
            return `<span class="stat-value">${val}</span>`;
        }

        async function loadPreMatch() {
            const container = document.getElementById("pre-match-container");
            const countEl   = document.getElementById("game-count");
            container.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Chargement...</div>';
            countEl.textContent = "—";

            try {
                const res  = await fetch("/nba/pre_match/games");
                const data = await res.json();

                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty"><div class="empty-icon">🏀</div>Aucun match disponible.</div>';
                    countEl.textContent = "0 match";
                    return;
                }

                countEl.textContent = `${data.length} match${data.length > 1 ? 's' : ''} aujourd'hui`;

                container.innerHTML = data.map(game => `
                    <div class="game-card">
                        <div class="card-top"></div>
                        <div class="card-body">
                            <div class="teams-row">
                                <span class="team-name">${game.homeTeam}</span>
                                <span class="vs">VS</span>
                                <span class="team-name away">${game.awayTeam}</span>
                            </div>
                            <div class="game-status">${game.status || 'Programmé'}</div>
                            <div class="stat-block">
                                <div class="stat-row">
                                    <span class="stat-label">PACE</span>
                                    ${statVal(game.pace)}
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">OFF RTG</span>
                                    ${statVal(game.off_rating)}
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">DEF RTG</span>
                                    ${statVal(game.def_rating)}
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">FORME</span>
                                    ${statVal(game.form)}
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <span class="game-id">ID: ${game.game_id}</span>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Erreur de connexion.<br><span style="font-size:0.75rem">${err.message}</span></div>`;
                countEl.textContent = "Erreur";
            }
        }

        document.getElementById("refresh-btn").addEventListener("click", loadPreMatch);
        loadPreMatch();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .catch(err => console.error('[SW]', err));
        }
    </script>

</body>
</html>
