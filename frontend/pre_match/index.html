<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Edge V∞ — Football</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0014; color:#e0e0e0; font-family:'Segoe UI',Arial,sans-serif; min-height:100vh; padding:20px; }
        .nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .nav a { color:#444; text-decoration:none; font-size:.8rem; letter-spacing:2px; }
        .nav a:hover { color:#b300ff; }
        h1 { color:#b300ff; font-size:2rem; letter-spacing:4px; text-shadow:0 0 20px #b300ff; }
        .subtitle { color:#444; font-size:.75rem; letter-spacing:3px; margin-top:4px; margin-bottom:30px; }
        .tabs { display:flex; gap:10px; margin-bottom:24px; }
        .tab { padding:8px 16px; border:1px solid rgba(179,0,255,0.3); background:transparent; color:#555; font-size:.75rem; letter-spacing:2px; cursor:pointer; transition:.2s; }
        .tab.active, .tab:hover { border-color:#b300ff; color:#b300ff; background:rgba(179,0,255,0.1); }
        .card { border:1px solid rgba(179,0,255,0.25); background:rgba(10,0,20,0.6); padding:20px; margin-bottom:16px; position:relative; overflow:hidden; transition:.25s; }
        .card::after { content:""; position:absolute; top:0; left:-100%; width:100%; height:2px; background:linear-gradient(90deg,transparent,#b300ff,transparent); animation:hud 3s linear infinite; }
        .card:hover { border-color:#b300ff; box-shadow:0 0 20px rgba(179,0,255,0.3); }
        @keyframes hud { 0%{left:-100%} 100%{left:100%} }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .score-badge { background:rgba(179,0,255,0.2); border:1px solid #b300ff; color:#b300ff; padding:4px 10px; font-size:.7rem; letter-spacing:2px; }
        .teams { font-size:1.1rem; color:#fff; margin-bottom:10px; }
        .vs { color:#b300ff; margin:0 8px; }
        .stats-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:.82rem; color:#888; }
        .stats-row span { color:#b300ff; }
        .verdict-value { color:#ff6600; font-weight:bold; }
        .verdict-none { color:#444; }
        .winner { color:#00ff88; font-weight:bold; }
        .weather { font-size:.75rem; color:#666; margin-top:8px; }
        .scores-box { margin-top:8px; font-size:.75rem; color:#555; }
        .scores-box span { color:#b300ff; }
        .loader { color:#333; letter-spacing:3px; text-align:center; margin-top:80px; }
        .filter-row { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .filter-btn { padding:6px 12px; border:1px solid rgba(179,0,255,0.2); background:transparent; color:#444; font-size:.7rem; cursor:pointer; transition:.2s; }
        .filter-btn.active, .filter-btn:hover { border-color:#b300ff; color:#b300ff; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">← ACCUEIL</a>
        <span style="color:#b300ff;font-size:.7rem;letter-spacing:2px" id="last-update"></span>
    </div>

    <h1>⚽ FOOTBALL</h1>
    <p class="subtitle">SHADOW EDGE V∞ — ANALYSE PRÉ-MATCH</p>

    <div class="tabs">
        <button class="tab active" onclick="showTab('top10')">🏆 TOP 10</button>
        <button class="tab" onclick="showTab('all')">📋 TOUS LES MATCHS</button>
    </div>

    <div class="filter-row" id="filter-row" style="display:none">
        <button class="filter-btn active" onclick="filterMatches('all')">Tous</button>
        <button class="filter-btn" onclick="filterMatches('value')">🔥 Value bets</button>
        <button class="filter-btn" onclick="filterMatches('over')">⬆️ Over</button>
        <button class="filter-btn" onclick="filterMatches('under')">⬇️ Under</button>
    </div>

    <div id="container"><p class="loader">Chargement...</p></div>

<script>
    let allMatches = [];
    let currentTab = 'top10';
    let currentFilter = 'all';

    async function loadData() {
        try {
            const [top10Res, allRes] = await Promise.all([
                fetch('/data/football/top10'),
                fetch('/data/football')
            ]);
            const top10 = await top10Res.json();
            const all   = await allRes.json();
            allMatches  = all.matches || [];

            document.getElementById('last-update').textContent =
                all.date ? `Dernière analyse: ${all.date}` : '';

            renderCurrent();
        } catch(e) {
            document.getElementById('container').innerHTML =
                '<p class="loader">En attente des données Termux...</p>';
        }
    }

    function showTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('filter-row').style.display = tab === 'all' ? 'flex' : 'none';
        renderCurrent();
    }

    function filterMatches(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderCurrent();
    }

    function renderCurrent() {
        if (currentTab === 'top10') {
            fetch('/data/football/top10')
                .then(r => r.json())
                .then(data => renderMatches(data));
        } else {
            let matches = allMatches;
            if (currentFilter === 'value')
                matches = matches.filter(m => m.verdict && m.verdict !== '⚪ Pas de value');
            else if (currentFilter === 'over')
                matches = matches.filter(m => m.prediction?.over_under?.includes('OVER'));
            else if (currentFilter === 'under')
                matches = matches.filter(m => m.prediction?.over_under?.includes('UNDER'));
            renderMatches(matches);
        }
    }

    function renderMatches(matches) {
        const container = document.getElementById('container');
        if (!matches || matches.length === 0) {
            container.innerHTML = '<p class="loader">Aucun match disponible.</p>';
            return;
        }

        container.innerHTML = matches.map(m => {
            const pred    = m.prediction || {};
            const odds    = m.odds || {};
            const form    = m.form || {};
            const weather = m.weather;
            const kelly   = m.kelly || {};
            const score   = m.shadow_score || 0;
            const verdict = m.verdict || '';
            const isValue = verdict !== '⚪ Pas de value' && verdict !== '';

            return `
            <div class="card">
                <div class="card-header">
                    <span class="score-badge">😈 ${score}/100</span>
                    <span style="color:#555;font-size:.7rem">${pred.confidence || 0}/100 confiance</span>
                </div>

                <div class="teams">
                    ${m.home} <span class="vs">VS</span> ${m.away}
                </div>

                <div class="stats-row">
                    Prédiction <span class="winner">${pred.winner || '—'}</span>
                </div>
                <div class="stats-row">
                    Probabilités
                    <span>${((pred.home_prob||0)*100).toFixed(0)}% / ${((pred.draw_prob||0)*100).toFixed(0)}% / ${((pred.away_prob||0)*100).toFixed(0)}%</span>
                </div>
                <div class="stats-row">
                    Cotes
                    <span>1:${odds['1']||'—'} X:${odds['X']||'—'} 2:${odds['2']||'—'}</span>
                </div>
                <div class="stats-row">
                    ${pred.over_under || '—'}
                    <span>Buts: ${pred.goals_expected || '—'}</span>
                </div>
                <div class="stats-row">
                    Forme DOM: ${(form.home||[]).join('')||'?'} | EXT: ${(form.away||[]).join('')||'?'}
                    <span>${form.home_trend||''} / ${form.away_trend||''}</span>
                </div>
                <div class="stats-row">
                    Kelly
                    <span>DOM:${kelly.home||0} EXT:${kelly.away||0}</span>
                </div>
                ${m.h2h ? `
                <div class="stats-row">
                    H2H (${m.h2h.total} matchs)
                    <span>${m.h2h.home_wins}W ${m.h2h.draws}D ${m.h2h.away_wins}L</span>
                </div>` : ''}
                ${weather ? `
                <div class="weather">
                    🌡️ ${weather.temp}°C 💨 ${weather.wind}km/h 🌧️ ${weather.rain}mm — ${m.weather_label||''}
                </div>` : ''}
                ${pred.top3_scores ? `
                <div class="scores-box">
                    🎯 Scores: ${pred.top3_scores.map(([s,p]) => `<span>${s}(${(p*100).toFixed(1)}%)</span>`).join(' | ')}
                </div>` : ''}
                <div class="stats-row" style="margin-top:8px">
                    <span class="${isValue ? 'verdict-value' : 'verdict-none'}">${verdict}</span>
                </div>
            </div>
            `;
        }).join('');
    }

    loadData();
    setInterval(loadData, 300000); // refresh 5min
</script>
</body>
</html>
