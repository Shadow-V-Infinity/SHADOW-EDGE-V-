<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0014">
    <link rel="manifest" href="/manifest.json">
    <title>Shadow Edge V∞ — LIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0014;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ── HEADER ── */
        .live-header {
            text-align: center;
            padding: 28px 20px 20px;
            border-bottom: 1px solid rgba(179,0,255,0.15);
        }

        .nav-back {
            display: inline-block;
            margin-bottom: 14px;
            color: #444;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: color 0.2s;
        }
        .nav-back:hover { color: #b300ff; }

        .live-title {
            font-size: 2rem;
            color: #b300ff;
            text-shadow: 0 0 20px #b300ff;
            letter-spacing: 4px;
        }

        .live-subtitle {
            margin-top: 4px;
            color: #444;
            font-size: 0.75rem;
            letter-spacing: 3px;
        }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(179,0,255,0.1);
        }

        .live-count {
            font-size: 0.8rem;
            color: #b300ff;
            letter-spacing: 1px;
        }

        .refresh-btn {
            padding: 7px 18px;
            border: 1px solid #b300ff;
            background: rgba(179,0,255,0.08);
            color: #b300ff;
            font-size: 0.78rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .refresh-btn:hover {
            background: #b300ff;
            color: #050505;
            box-shadow: 0 0 16px #b300ff;
        }

        /* ── GAMES ── */
        #games-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 16px 12px;
        }

        /* ── CARD ── */
        .live-card {
            border: 1px solid rgba(179,0,255,0.35);
            background: rgba(10,0,20,0.6);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            animation: pulseGlow 2.5s infinite ease-in-out;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .live-card:hover {
            border-color: #b300ff;
            box-shadow: 0 0 28px rgba(179,0,255,0.5);
        }

        /* HUD line */
        .live-card::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #b300ff, transparent);
            animation: hud-line 3s linear infinite;
        }

        @keyframes hud-line {
            0%   { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes pulseGlow {
            0%,100% { box-shadow: 0 0 10px rgba(179,0,255,0.15); }
            50%      { box-shadow: 0 0 24px rgba(179,0,255,0.4); }
        }

        /* ── CARD TOP ── */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px 6px;
        }

        .status-badge {
            background: rgba(179,0,255,0.2);
            border: 1px solid #b300ff;
            color: #b300ff;
            padding: 3px 10px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            border-radius: 3px;
        }

        .clock-info {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 1px;
        }

        /* ── SCORE ROW ── */
        .score-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 8px 16px 12px;
        }

        .team-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .team-name {
            font-size: 0.9rem;
            color: #aaa;
            letter-spacing: 2px;
        }

        .score {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 18px #b300ff, 0 0 36px rgba(179,0,255,0.4);
            letter-spacing: 2px;
            line-height: 1;
        }

        .score-sep {
            font-size: 2rem;
            color: rgba(179,0,255,0.6);
            padding-bottom: 4px;
        }

        /* ── LEADERS ── */
        .leaders-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 16px;
            border-top: 1px solid rgba(179,0,255,0.12);
            border-bottom: 1px solid rgba(179,0,255,0.12);
            background: rgba(179,0,255,0.04);
        }

        .leader-block { max-width: 48%; }
        .leader-block.right { text-align: right; }

        .leader-label {
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 1px;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .leader-name {
            font-size: 0.82rem;
            color: #ccc;
            display: block;
        }

        .leader-stats {
            font-size: 0.78rem;
            color: #b300ff;
            font-weight: bold;
        }

        /* ── STATS GRID ── */
        .stats-section {
            padding: 10px 16px;
        }

        .stats-title {
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }

        .stat-pill {
            background: rgba(179,0,255,0.07);
            border: 1px solid rgba(179,0,255,0.15);
            border-radius: 5px;
            padding: 6px 8px;
            text-align: center;
        }

        .stat-pill-label {
            font-size: 0.6rem;
            color: #555;
            letter-spacing: 1px;
            display: block;
            text-transform: uppercase;
        }

        .stat-pill-val {
            font-size: 0.88rem;
            color: #b300ff;
            font-weight: 700;
            display: block;
            margin-top: 2px;
        }

        /* ── MISMATCHES ── */
        .mismatches-section {
            padding: 8px 16px 12px;
            border-top: 1px solid rgba(179,0,255,0.1);
        }

        .mismatch-title {
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .mismatch-item {
            font-size: 0.75rem;
            color: #888;
            padding: 3px 0;
            border-bottom: 1px solid rgba(179,0,255,0.06);
        }

        .mismatch-item:last-child { border-bottom: none; }

        /* ── EMPTY / ERROR ── */
        .no-games {
            text-align: center;
            padding: 60px 20px;
            color: #333;
            font-size: 0.9rem;
            letter-spacing: 3px;
        }

        .no-games-icon { font-size: 36px; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="live-header">
    <a href="/" class="nav-back">← ACCUEIL</a>
    <h1 class="live-title">⚡ LIVE HUD</h1>
    <p class="live-subtitle">SHADOW EDGE V∞</p>
</div>

<div class="toolbar">
    <div class="live-count" id="live-count">—</div>
    <button class="refresh-btn" id="refresh-btn">↺ REFRESH</button>
</div>

<div id="games-container">
    <p class="no-games">Chargement…</p>
</div>

<script>
    // ── Format clock: "PT05M38.00S" → "5:38"
    function formatClock(clock) {
        if (!clock) return '';
        const m = clock.match(/PT(\d+)M([\d.]+)S/);
        if (!m) return clock;
        const mins = parseInt(m[1]);
        const secs = Math.floor(parseFloat(m[2]));
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // ── Render leader block
    function renderLeader(leaders, right = false) {
        if (!leaders || Object.keys(leaders).length === 0) {
            return `<p class="leader-name" style="color:#333">—</p>`;
        }

        const pts = leaders.points;
        const reb = leaders.rebounds;
        const ast = leaders.assists;

        let html = '';

        if (pts?.personName) {
            html += `<span class="leader-name">${pts.personName}</span>`;
            let statParts = [];
            if (pts?.value)  statParts.push(`${pts.value} PTS`);
            if (reb?.value)  statParts.push(`${reb.value} REB`);
            if (ast?.value)  statParts.push(`${ast.value} AST`);
            html += `<span class="leader-stats">${statParts.join(' · ')}</span>`;
        } else {
            html += `<span class="leader-name" style="color:#333">—</span>`;
        }

        return html;
    }

    // ── Render team stats pills
    function renderStats(game) {
        // On récupère les stats depuis boxscore si disponibles
        const homeTeam = game._boxscore?.homeTeam || {};
        const awayTeam = game._boxscore?.awayTeam || {};

        const homeFG  = homeTeam.statistics?.fieldGoalsPercentage;
        const away3P  = awayTeam.statistics?.threePointersPercentage;
        const homeTov = homeTeam.statistics?.turnovers;
        const awayTov = awayTeam.statistics?.turnovers;
        const homeReb = homeTeam.statistics?.reboundsTotal;
        const awayReb = awayTeam.statistics?.reboundsTotal;

        if (!homeFG && !homeReb) return '';

        const pct = v => v !== undefined ? `${Math.round(v * 100)}%` : '—';
        const val = v => v !== undefined ? v : '—';

        return `
        <div class="stats-section">
            <p class="stats-title">STATS LIVE</p>
            <div class="stats-grid">
                <div class="stat-pill">
                    <span class="stat-pill-label">FG% DOM</span>
                    <span class="stat-pill-val">${pct(homeFG)}</span>
                </div>
                <div class="stat-pill">
                    <span class="stat-pill-label">REB</span>
                    <span class="stat-pill-val">${val(homeReb)} / ${val(awayReb)}</span>
                </div>
                <div class="stat-pill">
                    <span class="stat-pill-label">FG% EXT</span>
                    <span class="stat-pill-val">${pct(awayTeam.statistics?.fieldGoalsPercentage)}</span>
                </div>
                <div class="stat-pill">
                    <span class="stat-pill-label">TOV DOM</span>
                    <span class="stat-pill-val">${val(homeTov)}</span>
                </div>
                <div class="stat-pill">
                    <span class="stat-pill-label">3P% EXT</span>
                    <span class="stat-pill-val">${pct(away3P)}</span>
                </div>
                <div class="stat-pill">
                    <span class="stat-pill-label">TOV EXT</span>
                    <span class="stat-pill-val">${val(awayTov)}</span>
                </div>
            </div>
        </div>`;
    }

    // ── Fetch boxscore for a game
    async function fetchBoxscore(gameId) {
        try {
            const res = await fetch(`/nba/live/boxscore/${gameId}`);
            return await res.json();
        } catch { return {}; }
    }

    // ── Main load
    async function loadGames() {
        const container = document.getElementById('games-container');
        const countEl   = document.getElementById('live-count');
        container.innerHTML = '<p class="no-games">Chargement…</p>';
        countEl.textContent = '—';

        try {
            const res  = await fetch('/nba/live/games');
            const data = await res.json();

            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="no-games">
                        <div class="no-games-icon">🏀</div>
                        Aucun match en cours.
                    </div>`;
                countEl.textContent = '0 match live';
                return;
            }

            countEl.textContent = `${data.length} match${data.length > 1 ? 's' : ''} en cours`;

            // Fetch boxscores en parallèle
            const boxscores = await Promise.all(
                data.map(g => fetchBoxscore(g.game_id))
            );

            container.innerHTML = data.map((g, i) => {
                const bs = boxscores[i] || {};
                g._boxscore = bs;

                const clock = formatClock(g.clock);
                const periodLabel = g.period ? `Q${g.period}` : '';

                return `
                <div class="live-card">
                    <div class="card-top">
                        <span class="status-badge">${g.status || 'LIVE'}</span>
                        <span class="clock-info">${periodLabel} ${clock}</span>
                    </div>

                    <div class="score-row">
                        <div class="team-block">
                            <span class="team-name">${g.home_team || '—'}</span>
                            <span class="score">${g.home_score ?? '—'}</span>
                        </div>
                        <span class="score-sep">:</span>
                        <div class="team-block">
                            <span class="team-name">${g.away_team || '—'}</span>
                            <span class="score">${g.away_score ?? '—'}</span>
                        </div>
                    </div>

                    <div class="leaders-row">
                        <div class="leader-block">
                            <p class="leader-label">LEADER DOM.</p>
                            ${renderLeader(g.leaders?.home)}
                        </div>
                        <div class="leader-block right">
                            <p class="leader-label">LEADER EXT.</p>
                            ${renderLeader(g.leaders?.away, true)}
                        </div>
                    </div>

                    ${renderStats(g)}
                </div>`;
            }).join('');

        } catch (e) {
            container.innerHTML = `
                <div class="no-games">
                    <div class="no-games-icon">⚠️</div>
                    Erreur de connexion API.
                </div>`;
            console.error('[Shadow Edge] loadGames error:', e);
        }
    }

    document.getElementById('refresh-btn').addEventListener('click', loadGames);

    // Auto-refresh 30s
    loadGames();
    setInterval(loadGames, 30000);

    // PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
            .catch(err => console.error('[SW]', err));
    }
</script>

</body>
</html>
