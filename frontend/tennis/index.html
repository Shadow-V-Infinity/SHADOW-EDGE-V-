<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Edge V∞ — TENNIS</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0014; color:#e0e0e0; font-family:'Segoe UI',Arial,sans-serif; min-height:100vh; padding:20px; }
        .nav { display:flex; justify-content:space-between; margin-bottom:30px; }
        .nav a { color:#444; text-decoration:none; font-size:.8rem; letter-spacing:2px; }
        .nav a:hover { color:#b300ff; }
        h1 { color:#b300ff; font-size:2rem; letter-spacing:4px; text-shadow:0 0 20px #b300ff; }
        .subtitle { color:#444; font-size:.75rem; letter-spacing:3px; margin-top:4px; margin-bottom:30px; }
        .tabs { display:flex; gap:10px; margin-bottom:24px; }
        .tab { padding:8px 16px; border:1px solid rgba(179,0,255,0.3); background:transparent; color:#555; font-size:.75rem; letter-spacing:2px; cursor:pointer; transition:.2s; }
        .tab.active, .tab:hover { border-color:#b300ff; color:#b300ff; background:rgba(179,0,255,0.1); }
        .card { border:1px solid rgba(179,0,255,0.25); background:rgba(10,0,20,0.6); padding:20px; margin-bottom:16px; position:relative; overflow:hidden; transition:.25s; }
        .card::after { content:""; position:absolute; top:0; left:-100%; width:100%; height:2px; background:linear-gradient(90deg,transparent,#b300ff,transparent); animation:hud 3s linear infinite; }
        .card:hover { border-color:#b300ff; box-shadow:0 0 20px rgba(179,0,255,0.3); }
        @keyframes hud { 0%{left:-100%} 100%{left:100%} }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .score-badge { background:rgba(179,0,255,0.2); border:1px solid #b300ff; color:#b300ff; padding:4px 10px; font-size:.7rem; letter-spacing:2px; }
        .teams { font-size:1.1rem; color:#fff; margin-bottom:10px; }
        .vs { color:#b300ff; margin:0 8px; }
        .stats-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:.82rem; color:#888; }
        .stats-row span { color:#b300ff; }
        .verdict-value { color:#ff6600; font-weight:bold; }
        .verdict-none { color:#444; }
        .winner { color:#00ff88; font-weight:bold; }
        .loader { color:#333; letter-spacing:3px; text-align:center; margin-top:80px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">← ACCUEIL</a>
        <span style="color:#b300ff;font-size:.7rem;letter-spacing:2px" id="last-update"></span>
    </div>

    <h1>🎾 TENNIS</h1>
    <p class="subtitle">SHADOW EDGE V∞ — ANALYSE PRÉ-MATCH</p>

    <div class="tabs">
        <button class="tab active" onclick="showTab('top10', this)">🏆 TOP 10</button>
        <button class="tab" onclick="showTab('all', this)">📋 TOUS</button>
        <button class="tab" onclick="showTab('value', this)">🔥 VALUE</button>
    </div>

    <div id="container"><p class="loader">Chargement...</p></div>

<script>
    let allMatches = [];

    async function loadData() {
        try {
            const r    = await fetch('/data/tennis');
            const data = await r.json();
            allMatches = data.matches || [];
            document.getElementById('last-update').textContent =
                data.date ? 'Analyse: ' + data.date : '';
            showTab('top10');
        } catch(e) {
            document.getElementById('container').innerHTML =
                '<p class="loader">En attente des données Termux...</p>';
        }
    }

    function showTab(tab, btn) {
        if (btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
        }
        let matches = allMatches;
        if (tab === 'top10')
            matches = [...allMatches].sort((a,b) => (b.shadow_score||0)-(a.shadow_score||0)).slice(0,10);
        else if (tab === 'value')
            matches = allMatches.filter(m => m.verdict && m.verdict !== '⚪ Pas de value');
        renderMatches(matches);
    }

    function renderMatches(matches) {
        const container = document.getElementById('container');
        if (!matches || matches.length === 0) {
            container.innerHTML = '<p class="loader">Aucun match disponible.</p>';
            return;
        }
        container.innerHTML = matches.map(m => {
            const pred    = m.prediction || {};
            const odds    = m.odds || {};
            const form    = m.form || {};
            const score   = m.shadow_score || 0;
            const verdict = m.verdict || '';
            const isValue = verdict !== '⚪ Pas de value' && verdict !== '';
            return `
            <div class="card">
                <div class="card-header">
                    <span class="score-badge">😈 ${score}/100</span>
                    <span style="color:#555;font-size:.7rem">${pred.confidence||0}/100 conf.</span>
                </div>
                <div class="teams">${m.home} <span class="vs">VS</span> ${m.away}</div>
                <div class="stats-row">Prédiction <span class="winner">${pred.winner||'—'}</span></div>
                <div class="stats-row">
                    Probs <span>${((pred.home_prob||0)*100).toFixed(0)}% / ${((pred.away_prob||0)*100).toFixed(0)}%</span>
                </div>
                <div class="stats-row">
                    Cotes <span>1:${odds['1']||'—'} 2:${odds['2']||'—'}</span>
                </div>
                <div class="stats-row">
                    Forme DOM: ${(form.home||[]).join('')||'?'} EXT: ${(form.away||[]).join('')||'?'}
                    <span>${form.home_trend||''}</span>
                </div>
                ${m.h2h ? `<div class="stats-row">H2H (${m.h2h.total}) <span>${m.h2h.home_wins}W ${m.h2h.draws}D ${m.h2h.away_wins}L</span></div>` : ''}
                <div class="stats-row" style="margin-top:8px">
                    <span class="${isValue ? 'verdict-value' : 'verdict-none'}">${verdict}</span>
                </div>
            </div>
            `;
        }).join('');
    }

    loadData();
    setInterval(loadData, 300000);
</script>
</body>
</html>
