<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SHADOW EDGE V∞</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');

:root {
    --bg:     #04000a;
    --bg2:    #08001a;
    --purple: #b300ff;
    --cyan:   #00ffe0;
    --red:    #ff2a5e;
    --yellow: #ffe600;
    --dim:    rgba(179,0,255,0.12);
    --border: rgba(179,0,255,0.25);
    --text:   #c0b8d0;
    --mono:   'Share Tech Mono', monospace;
    --sans:   'Rajdhani', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(179,0,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(179,0,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
}

header {
    position: relative;
    z-index: 10;
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
}

.logo {
    font-family: var(--mono);
    font-size: 1.4rem;
    color: var(--purple);
    text-shadow: 0 0 20px var(--purple);
    letter-spacing: 3px;
}

.logo span {
    font-size: 0.6rem;
    color: #444;
    display: block;
    letter-spacing: 4px;
    margin-top: 2px;
}

.header-right {
    text-align: right;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: #333;
}

.signal { color: var(--cyan); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

nav {
    position: relative;
    z-index: 10;
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }

.nav-btn {
    flex-shrink: 0;
    padding: 12px 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #444;
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.2s;
    white-space: nowrap;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active {
    color: var(--purple);
    border-bottom-color: var(--purple);
    text-shadow: 0 0 10px var(--purple);
}

main {
    position: relative;
    z-index: 10;
    padding: 16px;
    max-width: 680px;
    margin: 0 auto;
}

.summary-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 20px;
}

.summary-card {
    background: var(--dim);
    border: 1px solid var(--border);
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}
.summary-card:hover, .summary-card.active {
    border-color: var(--purple);
    background: rgba(179,0,255,0.2);
}
.summary-card .icon  { font-size: 1.1rem; display: block; }
.summary-card .count { font-family: var(--mono); font-size: 1.1rem; color: var(--purple); display: block; margin-top: 2px; }
.summary-card .lbl   { font-size: 0.5rem; color: #444; letter-spacing: 1px; display: block; }

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.section-title { font-family: var(--mono); font-size: 0.65rem; color: var(--purple); letter-spacing: 3px; }
.section-date  { font-family: var(--mono); font-size: 0.55rem; color: #333; }

.pick-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--purple);
    margin-bottom: 10px;
    padding: 14px;
    position: relative;
    overflow: hidden;
    transition: 0.2s;
}
.pick-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--purple), transparent);
}
.pick-card:hover { box-shadow: 0 0 20px rgba(179,0,255,0.15); }
.pick-card.diamant { border-left-color: var(--cyan); }
.pick-card.diamant::before { background: linear-gradient(90deg, var(--cyan), transparent); }
.pick-card.fort { border-left-color: var(--red); }
.pick-card.fort::before { background: linear-gradient(90deg, var(--red), transparent); }

.card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
}
.card-rank   { font-family: var(--mono); font-size: 0.6rem; color: #333; }
.card-match  { font-size: 0.95rem; font-weight: 700; color: #fff; letter-spacing: 1px; margin-bottom: 2px; }
.card-league { font-family: var(--mono); font-size: 0.55rem; color: #444; letter-spacing: 2px; margin-bottom: 8px; }
.card-score  { font-family: var(--mono); font-size: 1.1rem; font-weight: bold; }
.card-label  { font-size: 0.6rem; letter-spacing: 1px; color: #555; text-align: right; margin-top: 2px; }

.score-high { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
.score-mid  { color: var(--red); }
.score-low  { color: #555; }

.card-trends { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.trend-tag   { font-family: var(--mono); font-size: 0.55rem; padding: 2px 6px; border: 1px solid rgba(255,255,255,0.08); color: #555; }

.card-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 10px;
}
.stat-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); padding: 6px; text-align: center; }
.stat-box .val { font-family: var(--mono); font-size: 0.85rem; color: var(--cyan); display: block; }
.stat-box .lbl { font-size: 0.5rem; color: #444; letter-spacing: 1px; display: block; margin-top: 1px; }

.card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 8px;
}
.card-winner  { font-size: 0.8rem; font-weight: 700; color: var(--purple); }
.card-verdict { font-family: var(--mono); font-size: 0.6rem; color: var(--yellow); }
.card-odds    { font-family: var(--mono); font-size: 0.6rem; color: #444; margin-top: 2px; }

.empty {
    text-align: center;
    padding: 60px 20px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: #222;
    letter-spacing: 2px;
    line-height: 2;
}
.empty .big { font-size: 2rem; display: block; margin-bottom: 16px; opacity: 0.3; }

.loader {
    text-align: center;
    padding: 40px;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--purple);
    letter-spacing: 3px;
    animation: blink 1s infinite;
}

.combo-box {
    background: rgba(0,255,224,0.03);
    border: 1px solid rgba(0,255,224,0.2);
    padding: 16px;
    margin-top: 20px;
}
.combo-title { font-family: var(--mono); font-size: 0.6rem; color: var(--cyan); letter-spacing: 3px; margin-bottom: 12px; }
.combo-pick  { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.75rem; }
.combo-pick:last-of-type { border-bottom: none; }
.combo-cote  { font-family: var(--mono); color: var(--cyan); font-size: 0.9rem; }
.combo-total { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,255,224,0.2); }
.combo-total-label { font-family: var(--mono); font-size: 0.6rem; color: #444; letter-spacing: 2px; }
.combo-total-cote  { font-family: var(--mono); font-size: 1.4rem; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
    <div>
        <div class="logo">SHADOW EDGE V∞
            <span>MOTEUR ANALYTIQUE MULTI-SPORT</span>
        </div>
    </div>
    <div class="header-right">
        <div class="signal">● SIGNAL ACTIF</div>
        <div id="clock">--:--:--</div>
    </div>
</header>

<nav>
    <button class="nav-btn active" onclick="showSport('football')">⚽ FOOTBALL</button>
    <button class="nav-btn" onclick="showSport('basketball')">🏀 BASKET</button>
    <button class="nav-btn" onclick="showSport('tennis')">🎾 TENNIS</button>
    <button class="nav-btn" onclick="showSport('hockey')">🏒 HOCKEY</button>
    <button class="nav-btn" onclick="showSport('rugby')">🏉 RUGBY</button>
</nav>

<main>
    <div class="summary-bar" id="summary-bar">
        <div class="summary-card"><span class="icon">⚽</span><span class="count">-</span><span class="lbl">FOOTBALL</span></div>
        <div class="summary-card"><span class="icon">🏀</span><span class="count">-</span><span class="lbl">BASKET</span></div>
        <div class="summary-card"><span class="icon">🎾</span><span class="count">-</span><span class="lbl">TENNIS</span></div>
        <div class="summary-card"><span class="icon">🏒</span><span class="count">-</span><span class="lbl">HOCKEY</span></div>
        <div class="summary-card"><span class="icon">🏉</span><span class="count">-</span><span class="lbl">RUGBY</span></div>
    </div>

    <div class="section-header">
        <div class="section-title" id="section-title">⚽ TOP 10 PICKS — FOOTBALL</div>
        <div class="section-date" id="section-date">--</div>
    </div>

    <div id="picks-display"><div class="loader">SYNCHRONISATION...</div></div>
    <div id="combo-display"></div>
</main>

<script>
const API = '';
let currentSport = 'football';

setInterval(() => {
    document.getElementById('clock').innerText =
        new Date().toLocaleTimeString('fr-FR');
}, 1000);

const SPORTS = ['football','basketball','tennis','hockey','rugby'];
const ICONS  = ['⚽','🏀','🎾','🏒','🏉'];
const TITLES = {
    football:   '⚽ TOP 10 PICKS — FOOTBALL',
    basketball: '🏀 TOP 10 PICKS — BASKET',
    tennis:     '🎾 TOP 10 PICKS — TENNIS',
    hockey:     '🏒 TOP 10 PICKS — HOCKEY',
    rugby:      '🏉 TOP 10 PICKS — RUGBY',
};

function showSport(sport) {
    currentSport = sport;
    document.querySelectorAll('.nav-btn').forEach((b, i) => {
        b.classList.toggle('active', SPORTS[i] === sport);
    });
    document.getElementById('section-title').innerText = TITLES[sport];
    loadPicks(sport);
}

async function loadSummary() {
    try {
        const r    = await fetch(`${API}/data/all/summary`);
        const data = await r.json();
        document.getElementById('summary-bar').innerHTML = SPORTS.map((s, i) => {
            const d = data[s] || {};
            return `<div class="summary-card" onclick="showSport('${s}')">
                <span class="icon">${ICONS[i]}</span>
                <span class="count">${d.count || 0}</span>
                <span class="lbl">${s.toUpperCase()}</span>
            </div>`;
        }).join('');
    } catch(e) { console.error('Summary erreur', e); }
}

async function loadPicks(sport) {
    const display = document.getElementById('picks-display');
    const combo   = document.getElementById('combo-display');
    display.innerHTML = '<div class="loader">CHARGEMENT...</div>';
    combo.innerHTML   = '';

    try {
        const [r1, r2] = await Promise.all([
            fetch(`${API}/data/${sport}/top10`),
            fetch(`${API}/data/${sport}`)
        ]);
        const picks = await r1.json();
        const meta  = await r2.json();

        document.getElementById('section-date').innerText = meta.date || '--';

        if (!Array.isArray(picks) || !picks.length) {
            display.innerHTML = `<div class="empty">
                <span class="big">📡</span>
                EN ATTENTE DES DONNÉES<br>Lance le scraper sur Termux
            </div>`;
            return;
        }

        display.innerHTML = picks.map((m, i) => buildCard(m, i + 1)).join('');
        buildCombo(picks);

    } catch(e) {
        display.innerHTML = `<div class="empty">
            <span class="big">⚠️</span>
            ERREUR CONNEXION RAILWAY
        </div>`;
    }
}

function buildCard(m, rank) {
    const score  = m.shadow_score || 0;
    const label  = m.pick_label   || '';
    const pred   = m.prediction_v3 || m.prediction_v2 || m.prediction || {};
    const odds   = m.odds   || {};
    const value  = m.value  || {};
    const form   = m.form   || {};
    const kelly  = m.kelly  || pred.kelly || {};
    const league = m.league || m.sport    || '';

    const scoreClass = score >= 80 ? 'score-high' : score >= 60 ? 'score-mid' : 'score-low';
    const cardClass  = label.includes('DIAMANT') ? 'diamant' : label.includes('FORT') ? 'fort' : '';

    const winner    = pred.winner         || '?';
    const goals     = pred.goals_expected || '?';
    const overunder = pred.over_under     || '';
    const homeTrend = form.home_trend     || '?';
    const awayTrend = form.away_trend     || '?';
    const verdict   = m.verdict           || '';

    const vh = value.home || 0;
    const va = value.away || 0;
    const bestValue = Math.max(vh, va);
    const kh = kelly.home || 0;
    const ka = kelly.away || 0;
    const bestKelly = Math.max(kh, ka);

    return `
    <div class="pick-card ${cardClass}">
        <div class="card-top">
            <div>
                <div class="card-rank">#${rank}</div>
                <div class="card-match">${m.home} vs ${m.away}</div>
                <div class="card-league">${league.toUpperCase()}</div>
            </div>
            <div style="text-align:right">
                <div class="card-score ${scoreClass}">${score}<span style="font-size:0.5rem;color:#444">/100</span></div>
                <div class="card-label">${label}</div>
            </div>
        </div>
        <div class="card-trends">
            <span class="trend-tag">DOM: ${homeTrend}</span>
            <span class="trend-tag">EXT: ${awayTrend}</span>
            ${overunder ? `<span class="trend-tag">${overunder}</span>` : ''}
        </div>
        <div class="card-stats">
            <div class="stat-box">
                <span class="val">${bestValue > 0 ? '+' + (bestValue*100).toFixed(1) + '%' : '–'}</span>
                <span class="lbl">VALUE</span>
            </div>
            <div class="stat-box">
                <span class="val">${bestKelly > 0 ? (bestKelly*100).toFixed(1) + '%' : '–'}</span>
                <span class="lbl">KELLY</span>
            </div>
            <div class="stat-box">
                <span class="val">${goals}</span>
                <span class="lbl">BUTS EXP.</span>
            </div>
        </div>
        <div class="card-footer">
            <div class="card-winner">${winner}</div>
            <div style="text-align:right">
                <div class="card-verdict">${verdict}</div>
                <div class="card-odds">1:${odds['1']||'-'} X:${odds['X']||'-'} 2:${odds['2']||'-'}</div>
            </div>
        </div>
    </div>`;
}

function buildCombo(picks) {
    const combos = picks.filter(m => {
        const pred = m.prediction_v3 || m.prediction_v2 || m.prediction || {};
        return m.shadow_score >= 60
            && (m.verdict || '').includes('VALUE')
            && (pred.confidence || 0) >= 70;
    }).slice(0, 3);

    if (!combos.length) return;

    let total = 1;
    const lines = combos.map(c => {
        const pred   = c.prediction_v3 || c.prediction_v2 || c.prediction || {};
        const odds   = c.odds || {};
        const winner = pred.winner || '';
        let cote = winner.includes('🏠') ? (odds['1'] || 1)
                 : winner.includes('✈️') ? (odds['2'] || 1)
                 : (odds['X'] || 1);
        total *= parseFloat(cote);
        return `<div class="combo-pick">
            <div>${c.home} vs ${c.away}
            <br><span style="font-size:0.65rem;color:#555">${winner}</span></div>
            <div class="combo-cote">@ ${cote}</div>
        </div>`;
    }).join('');

    document.getElementById('combo-display').innerHTML = `
    <div class="combo-box">
        <div class="combo-title">🎰 COMBINÉ SUGGÉRÉ — ${combos.length} PICKS</div>
        ${lines}
        <div class="combo-total">
            <div class="combo-total-label">COTE COMBINÉE</div>
            <div class="combo-total-cote">${total.toFixed(2)}</div>
        </div>
    </div>`;
}

window.onload = () => {
    loadSummary();
    loadPicks('football');
    setInterval(loadSummary, 60000);
};
</script>
</body>
</html>
